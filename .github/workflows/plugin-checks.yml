name: Plugin checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  plugin-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin catalog
        run: python3 scripts/check-plugin-catalog.py

      - name: Lint plugin content
        run: python3 scripts/check-plugin-content.py

      - name: Check Codex marketplace metadata
        run: python3 scripts/sync-codex-marketplace.py --check
